name: Update Gini Data

on:
  schedule:
    - cron: '0 6 1 1 *'   # January 1st at 06:00 UTC (World Bank publishes annual data ~Q4)
  workflow_dispatch:        # Allow manual trigger from Actions tab

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch Gini data from World Bank
        run: node scripts/fetch-gini.mjs

      - name: Commit and push if data changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/gini.json
          git diff --staged --quiet && echo "No changes — skipping commit" && exit 0
          git commit -m "chore: update Gini data [skip ci]"
          git push
